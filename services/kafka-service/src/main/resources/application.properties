spring.application.name=messaging-kafka-service
server.port=8080
logging.level.root=INFO
logging.file.name=logs/messaging-kafka-service.log
# Use server.servlet.encoding properties instead of deprecated spring.http.encoding.*
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# ============================
# Kafka Configuration
# ============================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=messaging-kafka-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer


# ============================
# Messaging Configuration
# ============================

# polling timeout in seconds
messaging.pollingTimeout=35


# ============================
# Messaging Configuration
# ============================
udp.listener.port=9999

# ============================
# Redis Configuration (sessions & cache)
# ============================
# Use Redis for Spring Session and cache (spring-session + spring-data-redis)
# Core connection properties
#  - spring.redis.host (default: localhost)
#  - spring.redis.port (default: 6379)
#  - spring.redis.password (leave empty if no auth)
#  - spring.redis.database (database index, default: 0)
#  - spring.redis.timeout (connection/read timeout)
# Examples (environment variables):
#  - SPRING_REDIS_HOST=redis.example.com
#  - SPRING_REDIS_PORT=6379
#  - SPRING_REDIS_PASSWORD=secret
# For Sentinel or Cluster, configure the corresponding spring.redis.sentinel.* or spring.redis.cluster.* properties.
# Lettuce client is recommended (default in Spring Boot). Pool settings apply when using lettuce pooling.

# Use Redis for Spring Session and cache
spring.session.store-type=redis
spring.cache.type=redis

# Redis connection (adjust host/port/password/database as needed)
spring.redis.client-type=lettuce
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.database=0
spring.redis.timeout=60000ms

# Lettuce connection pool settings (optional)
# max-active: maximum connections in the pool
# max-idle/min-idle: idle connection tuning
# max-wait: max time to wait for a connection (duration is supported, e.g. 1000ms)
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-wait=1000ms

# Session timeout (ISO-8601 duration or shorthand like 30m)
# Example env var: SERVER_SERVLET_SESSION_TIMEOUT=30m
server.servlet.session.timeout=30m
# spring.session.timeout is deprecated in some Boot versions; server.servlet.session.timeout is preferred

# ============================
# Messaging cache properties (placeholders + docs)
# ============================
# The kafka-service uses Redis for two kinds of application-level data:
# 1) HTTP sessions stored via Spring Session (see spring.session.* above)
# 2) Application cache for sessions and kafka messages (prefixes + TTLs below)
#
# All messaging cache properties are prefixed with 'messaging.cache'. They are bound to
# the `CacheProperties` class in the application and can be overridden via application
# properties or environment variables. Environment variable names map by replacing
# '.' with '_' and uppercasing. For example:
#   messaging.cache.session-prefix             -> MESSAGING_CACHE_SESSION_PREFIX
#   messaging.cache.session-ttl-seconds        -> MESSAGING_CACHE_SESSION_TTL_SECONDS
#
# Properties and defaults (you can override):
#  - messaging.cache.session-prefix (default: session:)
#      Prefix used for storing session JSON objects in Redis. The session id is appended.
#      Example: session:abcd1234
#  - messaging.cache.session-ttl-seconds (default: 1800)
#      TTL in seconds for session entries (sliding TTL refreshed on access by the application).
#  - messaging.cache.kafka-msg-prefix (default: kafka_msg:)
#      Prefix for lists that hold kafka messages per key.
#      Example list key: kafka_msg:channel1:10
#  - messaging.cache.kafka-message-ttl-seconds (default: 300)
#      TTL in seconds applied to the kafka message lists (keeps list keys ttl-managed).
#  - messaging.cache.channel-sessions-prefix (default: channel_session:)
#      Prefix for Redis sets that contain session IDs for a given channel.
#      Example: channel_session:my-channel
#  - messaging.cache.kafka-message-max-count (default: 100)
#      Maximum number of messages to retain per kafka message list. If <= 0, no trimming is applied.
#
# Examples (override via application.properties or env vars):
#   messaging.cache.session-prefix=mysess:
#   messaging.cache.session-ttl-seconds=3600
#   MESSAGING_CACHE_KAFKA_MESSAGE_MAX_COUNT=200
#
# Existing placeholders (defaults provided below) - safe to change per environment
messaging.cache.session-prefix=session:
messaging.cache.session-ttl-seconds=1800
messaging.cache.kafka-msg-prefix=kafka_msg:
messaging.cache.kafka-message-ttl-seconds=300
messaging.cache.channel-sessions-prefix=channel_session:
messaging.cache.kafka-message-max-count=100

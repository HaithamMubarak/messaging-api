spring.application.name=messaging-kafka-service
server.port=8080
logging.level.root=INFO
logging.file.name=logs/messaging-kafka-service.log
spring.http.encoding.enabled=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true

# ============================
# Kafka Configuration
# ============================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=messaging-kafka-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer


# ============================
# Messaging Configuration
# ============================

# polling timeout in seconds
messaging.pollingTimeout=35

# kafka topic used to store session info
messaging.session.topic=session-store

# Enables or disables the session listener that processes Kafka message updates for the session topic
messaging.session.useListener=false